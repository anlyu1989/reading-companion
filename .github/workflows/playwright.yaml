name: playwright test

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "**"

jobs:
  # 共通のビルドジョブ
  playwright-version:
    permissions:
      contents: "read"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      playwright-version: ${{ steps.playwright-version.outputs.playwright-version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - name: Get installed Playwright version
        id: playwright-version
        run: |
          echo "playwright-version=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'])" | sed 's/[\^~]//')" >> "$GITHUB_OUTPUT"

  playwright-tests:
    needs: [playwright-version]
    permissions:
      contents: "read"
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.playwright-version.outputs.playwright-version }}-jammy
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1]
        shardTotal: [1]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          submodules: true
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Playwright tests
        run: pnpm exec playwright test --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload blob report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: playwright-blob-report-${{ matrix.shardIndex }}
          path: playwright-blob-report
          retention-days: 1

  # Merge reports after playwright-tests, even if some shards have failed
  merge-reports:
    timeout-minutes: 10
    if: ${{ !cancelled() }}
    needs: [playwright-tests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Download blob reports from GitHub Actions Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: all-blob-reports
          pattern: playwright-blob-report-*
          merge-multiple: true

      - name: Merge into HTML Report
        run: npx --yes "playwright@${NEEDS_BUILD_OUTPUTS_PLAYWRIGHT_VERSION}" merge-reports --reporter html ./all-blob-reports
        env:
          NEEDS_BUILD_OUTPUTS_PLAYWRIGHT_VERSION: ${{ needs.build.outputs.playwright-version }}

      - name: Upload HTML report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-html-report--attempt-${{ github.run_attempt }}
          path: playwright-report
          retention-days: 7

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
